<!DOCTYPE html>
<html>
<head><title>Debug</title></head>
<body style="background:#111;color:#fff;font-family:monospace;padding:20px;white-space:pre-wrap;">
<h2>Backend Debug</h2>
<div id="out">Loading...</div>
<script>
(async function() {
  const out = document.getElementById('out');
  try {
    const [statusResp, stateResp] = await Promise.all([
      fetch('/api/migration-status'),
      fetch('/api/state'),
    ]);

    if (!statusResp.ok) {
      out.textContent = 'Backend unreachable: /api/migration-status returned HTTP ' + statusResp.status + '. Run start.bat first.';
      return;
    }

    const status = await statusResp.json();
    const data = stateResp.ok ? await stateResp.json() : null;

    let txt = 'Migration status: ' + JSON.stringify(status) + '\n\n';

    if (!data || Object.keys(data).length === 0) {
      txt += 'data.db has no state row yet (fresh install or pre-import).';
    } else {
      txt += 'State JSON length: ' + JSON.stringify(data).length + ' chars\n';
      txt += 'Top keys: ' + Object.keys(data).join(', ') + '\n';
      txt += 'currentYear: ' + data.currentYear + '\n';
      txt += 'currentMonth: ' + data.currentMonth + '\n';
      txt += 'categories: ' + (Array.isArray(data.categories) ? data.categories.length + ' items' : 'MISSING') + '\n';
      if (data.habits) {
        txt += 'habits.daily: ' + (Array.isArray(data.habits.daily) ? data.habits.daily.length + ' habits' : 'NOT AN ARRAY: ' + typeof data.habits.daily) + '\n';
        if (Array.isArray(data.habits.daily) && data.habits.daily.length > 0) {
          txt += 'First habit: ' + JSON.stringify(data.habits.daily[0], null, 2).slice(0, 300) + '\n';
        }
      } else {
        txt += 'habits: MISSING\n';
      }
      txt += 'months: ' + (data.months ? Object.keys(data.months).join(', ') : 'MISSING') + '\n';
      txt += 'books.items: ' + (data.books && Array.isArray(data.books.items) ? data.books.items.length + ' books' : 'MISSING') + '\n';
    }

    out.textContent = txt;
  } catch(e) {
    out.textContent = 'ERROR: ' + e.message;
  }
})();
</script>
</body>
</html>
